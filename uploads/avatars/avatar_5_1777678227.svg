<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" style="background: radial-gradient(circle at 30% 30%, #ffffff 0%, #cbd5e1 100%); border-radius: 28px;"><defs><radialGradient id="skinPBS" cx="45%" cy="30%" r="75%">
