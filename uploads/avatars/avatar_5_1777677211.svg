                    <stop offset="60%" stop-color="#ead3c5" />
                    <stop offset="90%" stop-color="#af9e93" />
                    <stop offset="100%" stop-color="#80746c" />
                 </radialGradient><radialGradient id="noseGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#ead3c5" />
                 </radialGradient><linearGradient id="eyeSclera" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#f8fafc" />
