<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" style="background: radial-gradient(circle at center, #ffffff 0%, #cbd5e1 100%); border-radius: 20px;"><defs><radialGradient id="skinGrad" cx="50%" cy="40%" r="65%">
